
<style>
  :root { --node-r: 26; }
  #app { font-size: 14px; color: var(--color-text-primary); padding: 1rem 0; }
  #graph-wrap { position: relative; width: 100%; }
  svg#g { width: 100%; display: block; }
  #legend { display: flex; gap: 16px; flex-wrap: wrap; margin: 8px 0 0; font-size: 12px; color: var(--color-text-secondary); }
  .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; vertical-align: middle; margin-right: 4px; }
  #state-box { margin: 12px 0; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 16px; background: var(--color-background-secondary); font-size: 13px; }
  #state-box h3 { margin: 0 0 8px; font-size: 14px; font-weight: 500; }
  .kv { display: flex; gap: 8px; margin: 4px 0; }
  .kv-k { color: var(--color-text-secondary); min-width: 90px; }
  .kv-v { font-family: var(--font-mono); color: var(--color-text-primary); }
  #msg { margin: 10px 0; padding: 10px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 13px; line-height: 1.55; background: var(--color-background-primary); }
  #msg.cycle { border-color: #E24B4A; background: var(--color-background-danger); color: var(--color-text-danger); font-weight: 500; }
  #msg.ok { border-color: #639922; background: var(--color-background-success); color: var(--color-text-success); font-weight: 500; }
  #controls { display: flex; align-items: center; gap: 10px; margin: 12px 0 0; flex-wrap: wrap; }
  button { font-size: 13px; padding: 6px 16px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  button:hover { background: var(--color-background-secondary); }
  button:disabled { opacity: .4; cursor: default; }
  #step-counter { font-size: 12px; color: var(--color-text-secondary); margin-left: auto; }
  #graph-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  #graph-tabs button { font-size: 12px; padding: 4px 12px; }
  #graph-tabs button.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
</style>
<div id="app">
  <h2 style="sr-only">Cycle detection in undirected graph — interactive BFS walkthrough</h2>
  <div id="graph-tabs">
    <button onclick="loadGraph(0)" class="active">Graph with cycle</button>
    <button onclick="loadGraph(1)">Graph without cycle</button>
  </div>
  <div id="graph-wrap">
    <svg id="g" viewBox="0 0 580 260">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <g id="edges-g"></g>
      <g id="nodes-g"></g>
    </svg>
  </div>
  <div id="legend">
    <span><span class="dot" style="background:#D3D1C7;border:1.5px solid #888"></span>Unvisited</span>
    <span><span class="dot" style="background:#B5D4F4;border:1.5px solid #185FA5"></span>In queue</span>
    <span><span class="dot" style="background:#9FE1CB;border:1.5px solid #0F6E56"></span>Visited</span>
    <span><span class="dot" style="background:#E24B4A;border:1.5px solid #A32D2D"></span>Cycle detected!</span>
  </div>
  <div id="msg">Press <b>Next step</b> to begin the BFS traversal.</div>
  <div id="state-box">
    <h3>Algorithm state</h3>
    <div class="kv"><span class="kv-k">Queue</span><span class="kv-v" id="sv-q">[ ]</span></div>
    <div class="kv"><span class="kv-k">Visited set</span><span class="kv-v" id="sv-vis">{ }</span></div>
    <div class="kv"><span class="kv-k">Parent map</span><span class="kv-v" id="sv-par">{ }</span></div>
    <div class="kv"><span class="kv-k">Current node</span><span class="kv-v" id="sv-cur">—</span></div>
    <div class="kv"><span class="kv-k">Checking neighbor</span><span class="kv-v" id="sv-nb">—</span></div>
  </div>
  <div id="controls">
    <button id="btn-prev" onclick="go(-1)" disabled>← Prev</button>
    <button id="btn-next" onclick="go(1)">Next step →</button>
    <button onclick="reset()">↺ Restart</button>
    <span id="step-counter"></span>
  </div>
</div>

<script>
const GRAPHS = [
  {
    nodes: [0,1,2,3,4],
    edges: [[0,1],[1,2],[2,3],[3,4],[4,1]],
    pos: {0:[80,130],1:[200,60],2:[340,60],3:[460,130],4:[290,200]},
    labels: ['0','1','2','3','4']
  },
  {
    nodes: [0,1,2,3,4],
    edges: [[0,1],[0,2],[1,3],[1,4]],
    pos: {0:[290,50],1:[160,140],2:[420,140],3:[80,230],4:[240,230]},
    labels: ['0','1','2','3','4']
  }
];

let G, steps, stepIdx;

function adj(G, u) {
  return G.edges.filter(([a,b]) => a===u||b===u).map(([a,b]) => a===u?b:a);
}

function buildSteps(G) {
  const steps = [];
  const visited = new Set();
  const parent = {};
  const queue = [];
  let cycleEdge = null;

  steps.push({ type:'init', visited:new Set(), queue:[], parent:{}, cur:null, nb:null, msg:'Starting BFS from node 0. We add node 0 to the <b>queue</b> and mark it <b>visited</b>. We also record its parent as null.', highlight:[], cycleEdge:null });

  visited.add(0);
  parent[0] = null;
  queue.push(0);

  steps.push({ type:'enqueue', visited:new Set(visited), queue:[...queue], parent:{...parent}, cur:null, nb:null, msg:'<b>Add node 0 to queue</b> and <b>visited</b>. Visited = we\'ve already scheduled this node so we won\'t add it again. Queue = nodes waiting to be explored.', highlight:[0], cycleEdge:null });

  while (queue.length) {
    const u = queue.shift();
    steps.push({ type:'dequeue', visited:new Set(visited), queue:[...queue], parent:{...parent}, cur:u, nb:null, msg:`<b>Dequeue node ${u}</b>. Now we look at all its neighbors one by one.`, highlight:[u], cycleEdge:null });

    for (const v of adj(G, u)) {
      if (!visited.has(v)) {
        visited.add(v);
        parent[v] = u;
        queue.push(v);
        steps.push({ type:'visit', visited:new Set(visited), queue:[...queue], parent:{...parent}, cur:u, nb:v, msg:`Neighbor <b>${v}</b> is <b>not visited</b>. Add it to <b>queue</b> and <b>visited</b>, set parent[${v}] = ${u}. We won't enqueue it again.`, highlight:[u,v], cycleEdge:null });
      } else if (parent[u] !== v) {
        cycleEdge = [u,v];
        steps.push({ type:'cycle', visited:new Set(visited), queue:[...queue], parent:{...parent}, cur:u, nb:v, msg:`Neighbor <b>${v}</b> is already <b>visited</b> and is <b>not the parent</b> of ${u} (parent[${u}]=${parent[u]}). This means we found a <b>back edge ${u}↔${v}</b> — a cycle exists!`, highlight:[u,v], cycleEdge:[u,v] });
        return steps;
      } else {
        steps.push({ type:'skip', visited:new Set(visited), queue:[...queue], parent:{...parent}, cur:u, nb:v, msg:`Neighbor <b>${v}</b> is already visited, but it's the <b>parent</b> of ${u}. We skip it — in an undirected graph every edge appears twice, so seeing your own parent is normal, not a cycle.`, highlight:[u,v], cycleEdge:null });
      }
    }
  }
  steps.push({ type:'done', visited:new Set(visited), queue:[], parent:{...parent}, cur:null, nb:null, msg:'BFS complete. Every node was visited and no back edge was found. <b>No cycle exists</b> in this graph.', highlight:[], cycleEdge:null });
  return steps;
}

function colorOf(nodeId, step) {
  if (step.cycleEdge && step.cycleEdge.includes(nodeId)) return {fill:'#FCEBEB',stroke:'#A32D2D',text:'#501313'};
  if (step.cur === nodeId || step.nb === nodeId) return {fill:'#B5D4F4',stroke:'#185FA5',text:'#042C53'};
  if (step.visited.has(nodeId)) return {fill:'#9FE1CB',stroke:'#0F6E56',text:'#04342C'};
  if (step.queue.includes(nodeId)) return {fill:'#B5D4F4',stroke:'#185FA5',text:'#042C53'};
  return {fill:'#D3D1C7',stroke:'#888780',text:'#2C2C2A'};
}

function edgeColor(a, b, step) {
  if (step.cycleEdge && ((step.cycleEdge[0]===a&&step.cycleEdge[1]===b)||(step.cycleEdge[0]===b&&step.cycleEdge[1]===a))) return '#E24B4A';
  const inTree = step.parent[b]===a || step.parent[a]===b;
  if (inTree && step.visited.has(a) && step.visited.has(b)) return '#1D9E75';
  return 'var(--color-border-secondary)';
}

function render() {
  const step = steps[stepIdx];
  const svg = document.getElementById('g');
  const eg = document.getElementById('edges-g');
  const ng = document.getElementById('nodes-g');
  eg.innerHTML = '';
  ng.innerHTML = '';

  for (const [a,b] of G.edges) {
    const [x1,y1] = G.pos[a];
    const [x2,y2] = G.pos[b];
    const c = edgeColor(a,b,step);
    const isCycle = step.cycleEdge && ((step.cycleEdge[0]===a&&step.cycleEdge[1]===b)||(step.cycleEdge[0]===b&&step.cycleEdge[1]===a));
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke', c);
    line.setAttribute('stroke-width', isCycle ? '3' : '1.5');
    if (isCycle) line.setAttribute('stroke-dasharray','6 3');
    eg.appendChild(line);
  }

  for (const n of G.nodes) {
    const [cx,cy] = G.pos[n];
    const col = colorOf(n, step);
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',cx); circle.setAttribute('cy',cy); circle.setAttribute('r',24);
    circle.setAttribute('fill', col.fill);
    circle.setAttribute('stroke', col.stroke);
    circle.setAttribute('stroke-width', step.cur===n||step.nb===n||step.highlight.includes(n)?2.5:1.5);
    g.appendChild(circle);
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',cx); txt.setAttribute('y',cy);
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','central');
    txt.setAttribute('font-size','14'); txt.setAttribute('font-weight','500');
    txt.setAttribute('fill', col.text);
    txt.textContent = G.labels[n];
    g.appendChild(txt);

    if (step.parent[n] !== undefined && step.parent[n] !== null) {
      const pt = document.createElementNS('http://www.w3.org/2000/svg','text');
      pt.setAttribute('x',cx); pt.setAttribute('y',cy-30);
      pt.setAttribute('text-anchor','middle');
      pt.setAttribute('font-size','11');
      pt.setAttribute('fill','var(--color-text-secondary)');
      pt.textContent = 'par:'+step.parent[n];
      g.appendChild(pt);
    }
    ng.appendChild(g);
  }

  const msg = document.getElementById('msg');
  msg.innerHTML = step.msg;
  msg.className = step.type==='cycle'?'cycle':step.type==='done'&&!step.cycleEdge?'ok':'';

  document.getElementById('sv-q').textContent = '['+step.queue.join(', ')+']';
  document.getElementById('sv-vis').textContent = '{'+[...step.visited].join(', ')+'}';
  const pEntries = Object.entries(step.parent).map(([k,v])=>`${k}:${v}`).join(', ');
  document.getElementById('sv-par').textContent = '{'+pEntries+'}';
  document.getElementById('sv-cur').textContent = step.cur !== null ? step.cur : '—';
  document.getElementById('sv-nb').textContent = step.nb !== null ? step.nb : '—';
  document.getElementById('step-counter').textContent = `Step ${stepIdx+1} / ${steps.length}`;
  document.getElementById('btn-prev').disabled = stepIdx === 0;
  document.getElementById('btn-next').disabled = stepIdx === steps.length-1;
}

function go(d) { stepIdx = Math.max(0,Math.min(steps.length-1, stepIdx+d)); render(); }
function reset() { stepIdx = 0; render(); }

function loadGraph(i) {
  G = GRAPHS[i];
  steps = buildSteps(G);
  stepIdx = 0;
  document.querySelectorAll('#graph-tabs button').forEach((b,j)=>b.classList.toggle('active',j===i));
  render();
}

loadGraph(0);
</script>
